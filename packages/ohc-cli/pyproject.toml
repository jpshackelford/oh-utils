[project]
name = "ohc-cli"
version = "0.2.0"
description = "OpenHands Cloud CLI - Administrative command-line tools for OpenHands Cloud and Enterprise"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "JP Shackelford" }]
requires-python = ">=3.8"
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Systems Administration",
    "Topic :: Utilities",
]
keywords = ["openhands", "cli", "cloud", "administration", "devops"]
dependencies = [
    "ohc>=0.1.0",
    "click>=8.0.0",
    "kubernetes>=26.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
    "types-requests>=2.25.0",
]

[project.scripts]
ohc = "ohc_cli.cli:main"

[project.urls]
Homepage = "https://github.com/jpshackelford/oh-utils"
Repository = "https://github.com/jpshackelford/oh-utils"
Documentation = "https://github.com/jpshackelford/oh-utils#readme"
Issues = "https://github.com/jpshackelford/oh-utils/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ohc_cli"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/README.md",
    "/LICENSE",
]

[tool.uv.sources]
# During development, use local package from workspace
ohc = { workspace = true }
